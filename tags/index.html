---
layout: page
title: 태그
---

<ul id="tags-tab" class="nav nav-pills mb-3" role="tablist">
	{% for tag in site.tags %}
		<li class="nav-item" role="presentation">
			<button type="button" id="{{ tag[0] }}-tab" class="nav-link" data-bs-toggle="pill" data-bs-target="#{{ tag[0] }}" role="tab" aria-controls="{{ tag[0] }}" aria-selected="flase">#{{ tag[0] }}</button>
		</li>
	{% endfor %}
</ul>
<div class="tab-content mb-3" id="pills-tabContent">
	{% for tag in site.tags %}
		<!-- <div id="{{ tag[0] }}" class="post-group tab-pane fade" role="tabpanel" aria-labelledby="{{ tag[0] }}-tab" tabindex="0" data-tags="{{ tag[0] }}"> -->
		<div id="{{ tag[0] }}" class="tab-pane fade" role="tabpanel" aria-labelledby="{{ tag[0] }}-tab" tabindex="0">
			<div class="post-group" data-tags="{{ tag[0] }}"></div>
			<div class="paginate btn-group"></div>
			{%- comment -%}
			{%- for post in tag[1] -%}
				{%- include postlist.html post=post -%}
			{%- endfor -%}
			{%- endcomment -%}
		</div>
	{% endfor %}
</div>
