{%- assign post = include.post -%}
<div class="post-item">
	<h3 class="post-title">
		<a href="{{ post.url | prepend: site.baseurl | replace: '//', '/' }}">{{ post.title }}</a>
	</h3>
	<p class="post-meta">
		<i class="bi bi-person-fill" aria-hidden="true"></i>
		<span class="post-author" aria-description="작성자">
			{%- if post.author -%}
			{{ post.author }}
			{%- else -%}
			{{ site.author }}
			{%- endif -%}
		</span>
		<i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
		<span class="post-date" aria-description="등록일">{{ post.date | date: site.date_format }}</span>
	</p>
</div>
